<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Angebot</title><link rel="stylesheet" href="css/app.css"><link rel="stylesheet" href="css/customer.css"></head><body class="customer-page"><header class="customer-header customer-clean-header">
  <div class="customer-brand-mark" aria-hidden="true"></div>
  <div class="customer-brand-copy">
    <strong>mainabdichter</strong>
    <small>BKM.MANNESMANN Fachbetrieb</small>
  </div>
</header><main class="customer-main"><section id="document"><h1 class="customer-page-title">Angebot / Maßnahmenübersicht</h1><div class="metric"><span>Kunde</span><strong id="cName">–</strong></div><div class="metric"><span>Objekt</span><strong id="cAddress">–</strong></div><div class="customer-recommendation-block"><span>Empfehlung</span><p id="cRecommendation">–</p></div><h2>Maßnahmen</h2><div id="cMeasures"></div><div id="cExtras"></div><div id="cNormalRow" class="metric hidden"><span>Normalpreis</span><strong id="cNormal">–</strong></div><div id="cSpecialRow" class="metric hidden"><span id="cSpecialLabel">Sonderaktion</span><strong id="cSpecial">–</strong></div><div class="pricebox"><span>Angebotssumme</span><strong id="cOffer">–</strong><small>inkl. gesetzlicher Umsatzsteuer</small></div><div id="cSkontoRow" class="metric hidden"><span id="cSkontoLabel">Skonto</span><strong id="cSkonto">–</strong></div><section id="cNoticesSection" class="customer-notices hidden">
  <h2>Wichtige Hinweise zur Ausführung</h2>
  <div id="cNotices"></div>
</section>
<div id="cPhotos" class="photo-grid"></div></section><div class="customer-actions no-print"><button id="print" class="primary">PDF erstellen / drucken</button><button id="close" class="secondary">Zurück zur App</button></div><footer class="customer-footer">Vielen Dank für Ihr Vertrauen.</footer>
</main><script type="module" src="js/customer.js"></script></body></html>
