<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mainabdichter Pro – Stabil</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;background:#eef3f8;color:#1f2937}
header{background:#17365D;color:white;padding:16px}header h1{margin:0;font-size:20px}
nav{display:flex;gap:8px;overflow:auto;padding:10px;background:white;position:sticky;top:0}
button{border:0;border-radius:10px;padding:11px 13px;font-weight:700}
nav button{background:#e8eef6;color:#17365D;white-space:nowrap}
nav button.active,.primary{background:#2F75B5;color:white}
.secondary{background:#e8eef6;color:#17365D}.danger{background:#fee2e2;color:#991b1b}
main{max-width:820px;margin:auto;padding:14px}.page{display:none}.page.active{display:block}
.card{background:white;border-radius:15px;padding:15px;margin:12px 0;box-shadow:0 2px 10px rgba(23,54,93,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}
input,select,textarea{width:100%;box-sizing:border-box;padding:11px;border:1px solid #d7dee8;border-radius:10px;background:#fff2cc;font-size:16px}
textarea{min-height:75px}.metric{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #edf0f4}.metric strong{color:#17365D;text-align:right}
.price{font-size:30px;color:#1f6b2b!important}.measure{border:1px solid #d7dee8;border-radius:12px;padding:12px;margin:10px 0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status{padding:10px;border-radius:10px;margin-top:10px;display:none}.ok{display:block;background:#dcfce7;color:#166534}.err{display:block;background:#fee2e2;color:#991b1b}
@media(max-width:600px){.grid,.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Mainabdichter Pro – stabile Basis</h1></header>
<nav>
<button class="active" data-page="kunde">Kundenansicht</button>
<button data-page="daten">Kundendaten</button>
<button data-page="massnahmen">Maßnahmen</button>
<button data-page="lexware">Lexware</button>
</nav>
<main>

<section id="kunde" class="page active">
<div class="card">
<h2>Kundenansicht</h2>
<div class="metric"><span>Kunde</span><strong id="outName">–</strong></div>
<div class="metric"><span>Objekt</span><strong id="outAdresse">–</strong></div>
<div id="outMeasures"></div>
<div class="metric"><span>Beschreibung</span><strong id="outText">–</strong></div>
<div class="metric"><span>Gesamtpreis brutto</span><strong id="outPrice" class="price">–</strong></div>
<div class="metric"><span>5 % Skonto</span><strong id="outSkonto">–</strong></div>
</div>
</section>

<section id="daten" class="page">
<div class="card">
<h2>Kundendaten</h2>
<div class="grid">
<div><label>Anrede</label><select id="anrede"><option value="">–</option><option>Herr</option><option>Frau</option></select></div>
<div><label>Vorname</label><input id="vorname"></div>
<div><label>Nachname</label><input id="nachname"></div>
<div><label>Telefon</label><input id="telefon"></div>
<div><label>E-Mail</label><input id="email"></div>
<div><label>Straße</label><input id="strasse"></div>
<div><label>PLZ</label><input id="plz"></div>
<div><label>Ort</label><input id="ort"></div>
<div class="full"><label>Objektanschrift abweichend</label><input id="objekt"></div>
<div class="full"><label>Beschreibung</label><textarea id="beschreibung"></textarea></div>
</div>
</div>
</section>

<section id="massnahmen" class="page">
<div class="card">
<h2>Maßnahmen</h2>
<div id="measureList"></div>
<button id="addMeasure" class="primary">+ Maßnahme hinzufügen</button>
</div>
</section>

<section id="lexware" class="page">
<div class="card">
<h2>Lexware Office</h2>
<div class="grid">
<div class="full"><label>Worker-URL</label><input id="workerUrl" value="https://mainabdichter-lexoffice.cmww7htry5.workers.dev"></div>
<div class="full"><label>APP_SECRET</label><input id="appSecret" type="password"></div>
</div>
<div class="actions" style="margin-top:12px">
<button id="testLex" class="secondary">Verbindung testen</button>
<button id="sendLex" class="primary">Kunde an Lexware senden</button>
</div>
<div id="status" class="status"></div>
</div>
</section>

</main>
<script>
(function(){
"use strict";

const CONFIG={
 spacing:0.25,rowSpacing:0.25,factorHS:14,factorFS:10,reservePct:10,
 hsSellNet:98,wallSoleGross:300,resinGross:495,areaGross:690,
 setupNet:269,vat:19,skontoPct:5
};

let measures=JSON.parse(localStorage.getItem("mainabdichter_measures")||"[]");
if(!Array.isArray(measures)||measures.length===0){
 measures=[{type:"Horizontalsperre",length:8,width:0,height:0,wall:30}];
}

function $(id){return document.getElementById(id)}
function eur(v){return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v)}
function num(v){return new Intl.NumberFormat("de-DE",{maximumFractionDigits:2}).format(v)}
function saveMeasures(){localStorage.setItem("mainabdichter_measures",JSON.stringify(measures))}

document.querySelectorAll("nav button").forEach(function(btn){
 btn.addEventListener("click",function(){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.querySelectorAll("nav button").forEach(function(b){b.classList.remove("active")});
  $(btn.dataset.page).classList.add("active");
  btn.classList.add("active");
 });
});

["anrede","vorname","nachname","telefon","email","strasse","plz","ort","objekt","beschreibung"].forEach(function(id){
 $(id).addEventListener("input",calculate);
});

function hs(length,wall){
 const holes=Math.ceil((Number(length)||0)/CONFIG.spacing);
 const liters=holes*(Number(wall)||0)*CONFIG.factorHS/1000;
 return {holes:holes,liters:liters};
}
function fs(width,height,wall){
 const holesRow=Math.ceil((Number(width)||0)/CONFIG.spacing);
 const rows=Math.ceil((Number(height)||0)/CONFIG.rowSpacing);
 const first=holesRow*(Number(wall)||0)*CONFIG.factorHS/1000;
 const upper=Math.max(rows-1,0)*holesRow*(Number(wall)||0)*CONFIG.factorFS/1000;
 return {area:(Number(width)||0)*(Number(height)||0),liters:first+upper};
}
function calcMeasure(m){
 let gross=0,label="",liters=0;
 if(m.type==="Horizontalsperre"){
  const r=hs(m.length,m.wall);liters=r.liters;
  gross=Math.ceil(liters*(1+CONFIG.reservePct/100))*CONFIG.hsSellNet*(1+CONFIG.vat/100);
  label=num(m.length)+" lfm";
 }
 if(m.type==="Flächensperre"){
  const r=fs(m.width,m.height,m.wall);liters=r.liters;
  gross=r.area*CONFIG.areaGross;
  label=num(m.width)+" × "+num(m.height)+" m = "+num(r.area)+" m²";
 }
 if(m.type==="Harzverpressung"){
  gross=(Number(m.length)||0)*CONFIG.resinGross;
  label=num(m.length)+" lfm";
 }
 if(m.type==="Wand-Sohlen-Anschluss"){
  const r=hs(m.length,m.wall);liters=r.liters;
  gross=(Number(m.length)||0)*CONFIG.wallSoleGross+
    Math.ceil(liters*(1+CONFIG.reservePct/100))*CONFIG.hsSellNet*(1+CONFIG.vat/100);
  label=num(m.length)+" lfm inkl. Horizontalsperre";
 }
 return {gross:gross,label:label,liters:liters};
}

function renderMeasures(){
 const box=$("measureList");box.innerHTML="";
 measures.forEach(function(m,i){
  const isArea=m.type==="Flächensperre";
  const wrap=document.createElement("div");wrap.className="measure";
  wrap.innerHTML=
   '<div class="grid">'+
   '<div><label>Art</label><select data-i="'+i+'" data-field="type">'+
   '<option'+(m.type==="Horizontalsperre"?" selected":"")+'>Horizontalsperre</option>'+
   '<option'+(m.type==="Flächensperre"?" selected":"")+'>Flächensperre</option>'+
   '<option'+(m.type==="Harzverpressung"?" selected":"")+'>Harzverpressung</option>'+
   '<option'+(m.type==="Wand-Sohlen-Anschluss"?" selected":"")+'>Wand-Sohlen-Anschluss</option>'+
   '</select></div>'+
   '<div><label>Wandstärke cm</label><input type="number" value="'+(m.wall||30)+'" data-i="'+i+'" data-field="wall"></div>'+
   (isArea?
    '<div><label>Breite m</label><input type="number" step="0.01" value="'+(m.width||0)+'" data-i="'+i+'" data-field="width"></div>'+
    '<div><label>Höhe m</label><input type="number" step="0.01" value="'+(m.height||0)+'" data-i="'+i+'" data-field="height"></div>'
    :
    '<div><label>Länge lfm</label><input type="number" step="0.01" value="'+(m.length||0)+'" data-i="'+i+'" data-field="length"></div>'
   )+
   '</div><div id="result_'+i+'" style="margin-top:8px"></div>'+
   '<button class="danger" data-delete="'+i+'">Löschen</button>';
  box.appendChild(wrap);
 });
 box.querySelectorAll("[data-field]").forEach(function(el){
  el.addEventListener("input",function(){
   const i=Number(el.dataset.i),field=el.dataset.field;
   measures[i][field]=el.value;
   saveMeasures();
   if(field==="type"){renderMeasures()}
   calculate();
  });
 });
 box.querySelectorAll("[data-delete]").forEach(function(btn){
  btn.addEventListener("click",function(){
   measures.splice(Number(btn.dataset.delete),1);
   saveMeasures();renderMeasures();calculate();
  });
 });
}
$("addMeasure").addEventListener("click",function(){
 measures.push({type:"Horizontalsperre",length:0,width:0,height:0,wall:30});
 saveMeasures();renderMeasures();calculate();
});

function calculate(){
 let totalMeasures=0;
 const out=$("outMeasures");out.innerHTML="";
 measures.forEach(function(m,i){
  const r=calcMeasure(m);totalMeasures+=r.gross;
  const local=$("result_"+i);
  if(local)local.textContent=r.label+" · "+eur(r.gross);
  const row=document.createElement("div");row.className="metric";
  row.innerHTML="<span>"+m.type+"</span><strong>"+r.label+"</strong>";
  out.appendChild(row);
 });
 const setupGross=CONFIG.setupNet*(1+CONFIG.vat/100);
 const total=totalMeasures+setupGross;
 const skonto=total*(1-CONFIG.skontoPct/100);
 const name=[$("anrede").value,$("vorname").value,$("nachname").value].filter(Boolean).join(" ");
 const adr=$("objekt").value||[$("strasse").value,$("plz").value,$("ort").value].filter(Boolean).join(", ");
 $("outName").textContent=name||"–";
 $("outAdresse").textContent=adr||"–";
 $("outText").textContent=$("beschreibung").value||"–";
 $("outPrice").textContent=eur(total);
 $("outSkonto").textContent=eur(skonto);
}

function lexConfig(){
 let url=$("workerUrl").value.trim();
 if(url.endsWith("/"))url=url.slice(0,-1);
 const secret=$("appSecret").value;
 localStorage.setItem("mainabdichter_worker",url);
 localStorage.setItem("mainabdichter_secret",secret);
 return {url:url,secret:secret};
}
function setStatus(message,ok){
 const s=$("status");s.className="status "+(ok?"ok":"err");s.textContent=message;
}
$("testLex").addEventListener("click",async function(){
 const c=lexConfig();
 try{
  const r=await fetch(c.url+"/profile",{headers:{"X-App-Secret":c.secret}});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||"Verbindung fehlgeschlagen");
  setStatus("Verbindung erfolgreich.",true);
 }catch(e){setStatus(e.message,false)}
});
$("sendLex").addEventListener("click",async function(){
 const c=lexConfig();
 if(!$("nachname").value.trim())return setStatus("Nachname fehlt.",false);
 if(!$("strasse").value.trim()||!$("plz").value.trim()||!$("ort").value.trim())return setStatus("Straße, PLZ und Ort müssen vollständig sein.",false);
 const payload={
  salutation:$("anrede").value,
  firstName:$("vorname").value,
  lastName:$("nachname").value,
  street:$("strasse").value,
  zip:$("plz").value,
  city:$("ort").value,
  email:$("email").value,
  phone:$("telefon").value,
  note:"Erstellt über Mainabdichter Pro"
 };
 try{
  setStatus("Übertragung läuft …",true);
  const r=await fetch(c.url+"/contacts",{method:"POST",headers:{"Content-Type":"application/json","X-App-Secret":c.secret},body:JSON.stringify(payload)});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||"Übertragung fehlgeschlagen");
  setStatus("Kunde wurde in Lexware angelegt.",true);
 }catch(e){setStatus(e.message,false)}
});

$("workerUrl").value=localStorage.getItem("mainabdichter_worker")||$("workerUrl").value;
$("appSecret").value=localStorage.getItem("mainabdichter_secret")||"";
renderMeasures();calculate();
})();
</script>
</body>
</html>
